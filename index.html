<!DOCTYPE html>
<html lang="tr" class="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <meta name="description"
    content="CarSync Pro — Akıllı araç takip ve bakım yönetimi. Araçlarınızı kolayca yönetin, bakım takibi yapın, yakıt tüketimini izleyin." />
  <meta name="theme-color" content="#C9A84C" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>CarSync Pro — Akıllı Araç Takip ve Bakım Yönetimi</title>
  <link rel="icon" type="image/png" href="/favicon.ico" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-title" content="CarSync Pro" />

  <!-- Google AdSense Script -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6329108306834809"
    crossorigin="anonymous"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Light Mode Defaults */
    body {
      background-color: #f8fafc;
      color: #020617;
    }

    /* Dark Mode Overrides */
    .dark body {
      background-color: #020617;
      color: white;
    }

    /* Custom Scrollbar for dark theme */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Touch optimization */
    button,
    a,
    input,
    select,
    textarea {
      touch-action: manipulation;
    }

    /* Safe Area handling for notched phones */
    #root {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      min-height: 100vh;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
